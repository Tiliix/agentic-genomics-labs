name: ci

# Lint + smoke-import only. No network calls (Open Targets / Azure are not hit in CI).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Smoke import (no network)
        # Import the modules to catch syntax/import errors. The agent's Azure client is
        # constructed lazily, so importing does not require credentials or internet.
        run: |
          python -c "import src.opentargets, src.rank_agent; print('imports OK')"

      - name: Offline data fallback works
        # download_data.py must succeed offline by using the bundled fallback snapshot.
        run: |
          python scripts/download_data.py --efo EFO_0001360 --size 5
          test -f data/associations_EFO_0001360.json && echo "snapshot written"
