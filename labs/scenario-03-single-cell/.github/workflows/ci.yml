name: ci

# Lint + lightweight import smoke test. We do NOT run the full pipeline in CI
# (it downloads data and needs the heavy scientific stack); we only verify the
# code lints cleanly and the lightweight modules import.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tooling
        # ruff for linting; the agent module's light deps for the import smoke test.
        run: |
          python -m pip install --upgrade pip
          pip install ruff openai>=1.40 python-dotenv pandas

      - name: Ruff lint
        run: ruff check src scripts

      - name: Smoke import (annotate_agent)
        # Import the agent module without invoking Azure — proves it parses and
        # its light dependencies resolve. pipeline.py needs scanpy, so we only
        # byte-compile it here rather than import it.
        run: |
          python -c "import importlib.util, pathlib; \
            spec = importlib.util.spec_from_file_location('annotate_agent', 'src/annotate_agent.py'); \
            m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m); \
            print('annotate_agent imported OK')"

      - name: Byte-compile pipeline + download script
        run: python -m py_compile src/pipeline.py scripts/download_data.py
