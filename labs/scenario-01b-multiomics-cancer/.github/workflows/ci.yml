name: CI

# Lint + smoke-import + deterministic router tests on every push / PR.
# NO network calls and NO Azure secrets are required: the conditional-routing
# behaviour is proven entirely by the pure-Python router tests.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src scripts tests

      - name: Smoke import (no network, no Azure)
        # Import the deterministic core and exercise every omics skill once.
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          import omics, router
          assert len(omics.TOOL_FUNCTIONS) == 12, 'expected 12 omics skills'
          print('Smoke OK: 12 omics tools importable')
          "

      - name: Generate deterministic synthetic cases
        run: python scripts/download_data.py --source synthetic

      - name: Run router tests (proves conditional divergence)
        run: python -m pytest tests/test_router.py -v

      - name: Show the three divergent tool paths
        run: python scripts/run_cases.py --router-only
