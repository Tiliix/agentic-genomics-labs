# Minimal config so `ruff check src scripts` in CI is deterministic.
[tool.ruff]
line-length = 90
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# annotate.py intentionally imports requests at top; agent.py imports the
# Azure SDKs lazily inside functions so the smoke import works without them.
ignore = ["E402"]
